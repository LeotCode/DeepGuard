<svg width="1600" height="620" viewBox="0 0 1600 620" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="18" markerHeight="18" refX="14" refY="9" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L16 9L2 16V2Z" fill="#38BDF8"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#020617" flood-opacity="0.24"/>
    </filter>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="620" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#EAF6FF"/>
    </linearGradient>
    <linearGradient id="c1" x1="76" y1="154" x2="394" y2="466" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F766E"/>
      <stop offset="1" stop-color="#14B8A6"/>
    </linearGradient>
    <linearGradient id="c2" x1="452" y1="154" x2="770" y2="466" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1D4ED8"/>
      <stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="c3" x1="828" y1="154" x2="1146" y2="466" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#EC4899"/>
    </linearGradient>
    <linearGradient id="c4" x1="1204" y1="154" x2="1522" y2="466" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EA580C"/>
      <stop offset="1" stop-color="#FACC15"/>
    </linearGradient>
    <style>
      .title { font: 800 38px Inter, Arial, sans-serif; fill: #0F172A; letter-spacing: 0; }
      .sub { font: 500 18px Inter, Arial, sans-serif; fill: #475569; letter-spacing: 0; }
      .step { font: 800 16px Inter, Arial, sans-serif; fill: rgba(255,255,255,0.82); letter-spacing: 1.5px; }
      .head { font: 800 27px Inter, Arial, sans-serif; fill: #FFFFFF; letter-spacing: 0; }
      .body { font: 600 18px Inter, Arial, sans-serif; fill: rgba(255,255,255,0.94); letter-spacing: 0; }
      .libs { font: 700 15px Inter, Arial, sans-serif; fill: rgba(255,255,255,0.86); letter-spacing: 0; }
      .tag { font: 700 13px Inter, Arial, sans-serif; fill: #0F172A; letter-spacing: 0; }
      .small { font: 600 13px Inter, Arial, sans-serif; fill: #64748B; letter-spacing: 0; }
    </style>
  </defs>

  <rect width="1600" height="620" rx="0" fill="url(#bg)"/>

  <text x="80" y="72" class="title">DeepGuard Image Detection Pipeline</text>
  <text x="80" y="105" class="sub">Four-container Figma diagram: upload to explainable scan result</text>

  <rect x="76" y="154" width="318" height="312" rx="18" fill="url(#c1)" filter="url(#shadow)"/>
  <text x="106" y="198" class="step">STEP 01</text>
  <text x="106" y="238" class="head">Upload + Auth</text>
  <text x="106" y="279" class="body">Select image</text>
  <text x="106" y="307" class="body">Firebase token</text>
  <text x="106" y="335" class="body">POST /scan validation</text>
  <rect x="106" y="374" width="246" height="48" rx="10" fill="rgba(255,255,255,0.16)"/>
  <text x="122" y="404" class="libs">Next.js, React, FastAPI</text>
  <text x="106" y="448" class="small" fill="#FFFFFF">Steps 1-3</text>

  <line x1="414" y1="310" x2="432" y2="310" stroke="#38BDF8" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow)"/>

  <rect x="452" y="154" width="318" height="312" rx="18" fill="url(#c2)" filter="url(#shadow)"/>
  <text x="482" y="198" class="step">STEP 02</text>
  <text x="482" y="238" class="head">Preprocess + Faces</text>
  <text x="482" y="279" class="body">RGB load + resize</text>
  <text x="482" y="307" class="body">Haar face crops</text>
  <text x="482" y="335" class="body">Blur, color, edges</text>
  <rect x="482" y="374" width="246" height="48" rx="10" fill="rgba(255,255,255,0.16)"/>
  <text x="498" y="404" class="libs">Pillow, OpenCV, NumPy</text>
  <text x="482" y="448" class="small" fill="#FFFFFF">Steps 4-6</text>

  <line x1="790" y1="310" x2="808" y2="310" stroke="#38BDF8" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow)"/>

  <rect x="828" y="154" width="318" height="312" rx="18" fill="url(#c3)" filter="url(#shadow)"/>
  <text x="858" y="198" class="step">STEP 03</text>
  <text x="858" y="238" class="head">AI Ensemble</text>
  <text x="858" y="279" class="body">EfficientNet-B5</text>
  <text x="858" y="307" class="body">Xception + ResNet50V2</text>
  <text x="858" y="335" class="body">Avg score + red flags</text>
  <rect x="858" y="374" width="246" height="48" rx="10" fill="rgba(255,255,255,0.16)"/>
  <text x="874" y="404" class="libs">PyTorch, TensorFlow</text>
  <text x="858" y="448" class="small" fill="#FFFFFF">Steps 7-9</text>

  <line x1="1166" y1="310" x2="1184" y2="310" stroke="#38BDF8" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow)"/>

  <rect x="1204" y="154" width="318" height="312" rx="18" fill="url(#c4)" filter="url(#shadow)"/>
  <text x="1234" y="198" class="step">STEP 04</text>
  <text x="1234" y="238" class="head">Store + Display</text>
  <text x="1234" y="279" class="body">Save scan record</text>
  <text x="1234" y="307" class="body">Render risk + heatmap</text>
  <text x="1234" y="335" class="body">Show model breakdown</text>
  <rect x="1234" y="374" width="246" height="48" rx="10" fill="rgba(255,255,255,0.16)"/>
  <text x="1250" y="404" class="libs">Firestore, React, Recharts</text>
  <text x="1234" y="448" class="small" fill="#FFFFFF">Steps 10-11</text>

  <rect x="80" y="505" width="1440" height="54" rx="14" fill="#FFFFFF" stroke="#D8E3EF"/>
  <text x="105" y="539" class="tag">Output:</text>
  <text x="170" y="539" class="small">ai_score, confidence, fake/real label, face count, per-model scores, red flags, summary, heatmap regions</text>
</svg>
